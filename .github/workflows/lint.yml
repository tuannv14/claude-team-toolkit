name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skill-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json + marketplace.json present
        run: |
          jq empty .claude-plugin/plugin.json
          test "$(jq -r .name .claude-plugin/plugin.json)" = "claude-team-toolkit"
          test -f .claude-plugin/marketplace.json \
            || { echo "FAIL: .claude-plugin/marketplace.json is required for users to add this as a Claude Code marketplace"; exit 1; }
          jq empty .claude-plugin/marketplace.json
          test "$(jq -r '.plugins | length' .claude-plugin/marketplace.json)" -ge 1 \
            || { echo "FAIL: marketplace.json must list at least one plugin"; exit 1; }

      - name: Schema check — plugin.json author/repository shapes
        run: |
          # author must be object, repository must be string (per Claude's official schema)
          test "$(jq -r '.author | type' .claude-plugin/plugin.json)" = "object" \
            || { echo "FAIL: author must be an object {name, email, url}"; exit 1; }
          test "$(jq -r '.repository | type' .claude-plugin/plugin.json)" = "string" \
            || { echo "FAIL: repository must be a string URL, not an object"; exit 1; }
          echo "Schema OK: author is object, repository is string"

      - name: YAML frontmatter parse check (each SKILL.md)
        run: |
          # Use python yaml to actually parse — catches issues that grep misses
          # (e.g., unquoted colon-space in description field)
          python3 -c "
          import yaml, glob, sys
          fail = 0
          for f in sorted(glob.glob('skills/*/SKILL.md')):
            try:
              with open(f, 'r', encoding='utf-8') as fp:
                content = fp.read()
              parts = content.split('---', 2)
              if len(parts) < 3:
                print(f'FAIL: {f} missing --- delimiters')
                fail += 1
                continue
              try:
                data = yaml.safe_load(parts[1])
              except yaml.YAMLError as e:
                print(f'FAIL: {f} YAML parse error: {e}')
                fail += 1
                continue
              if not isinstance(data, dict):
                print(f'FAIL: {f} frontmatter is not a dict (got {type(data).__name__})')
                fail += 1
                continue
              for required in ['name', 'description']:
                if required not in data or not data[required]:
                  print(f'FAIL: {f} missing or empty {required}')
                  fail += 1
            except Exception as e:
              print(f'FAIL: {f} unexpected: {e}')
              fail += 1
          if fail == 0:
            print('All SKILL.md frontmatters parse correctly as YAML')
          sys.exit(fail)
          "

      - name: Validate every SKILL.md frontmatter
        run: |
          for f in skills/*/SKILL.md; do
            echo "Checking $f"
            # Must start with --- and have closing ---
            head -1 "$f" | grep -q '^---$' || { echo "FAIL: $f missing leading ---"; exit 1; }

            # Must have name + description fields in frontmatter
            head -20 "$f" | grep -q '^name:' || { echo "FAIL: $f missing name"; exit 1; }
            head -20 "$f" | grep -q '^description:' || { echo "FAIL: $f missing description"; exit 1; }

            # Description must be ≤ 60 words (token efficiency policy: 40, allow some slack)
            desc=$(awk '/^description:/,/^[a-z][a-z-]*:|^---/' "$f" | head -10 | tr '\n' ' ')
            words=$(echo "$desc" | wc -w)
            if [ "$words" -gt 70 ]; then
              echo "FAIL: $f description is $words words (max 70)"
              exit 1
            fi
          done
          echo "All SKILL.md files valid"

      - name: Shellcheck lib/*.sh
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./lib
          severity: warning              # only fail on warning+; notes are advisory

      - name: Test lib/credentials.sh
        run: |
          export HOME=/tmp/ctt-test
          mkdir -p /tmp/ctt-test/.test/.git
          cat > /tmp/ctt-test/.test/credentials <<'EOF'
          [default]
          key = K_default
          token = T_default

          [work]
          key = K_work
          token = T_work
          EOF
          chmod 600 /tmp/ctt-test/.test/credentials

          source lib/credentials.sh

          # Test 1: default profile
          ctt_load_creds test
          test "$CTT_PROFILE" = "default" || { echo "FAIL test1: profile=$CTT_PROFILE"; exit 1; }
          test "$CTT_KEY" = "K_default" || { echo "FAIL test1: key=$CTT_KEY"; exit 1; }

          # Test 2: explicit profile arg
          ctt_load_creds test work
          test "$CTT_PROFILE" = "work" || { echo "FAIL test2: profile=$CTT_PROFILE"; exit 1; }
          test "$CTT_KEY" = "K_work" || { echo "FAIL test2: key=$CTT_KEY"; exit 1; }

          # Test 3: env var
          TEST_PROFILE=work ctt_load_creds test
          test "$CTT_PROFILE" = "work" || { echo "FAIL test3"; exit 1; }

          # Test 4: mask
          test "$(ctt_mask 'abcd1234efgh5678')" = "****5678" || { echo "FAIL test4"; exit 1; }

          # Test 5: nonexistent profile fails
          if ctt_load_creds test nonexistent 2>/dev/null; then
            echo "FAIL test5: should have failed"
            exit 1
          fi

          echo "lib/credentials.sh: 5/5 tests pass"

  no-credential-leak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify no real credential patterns
        run: |
          # Look for real-looking AWS/GH/Heroku/Slack patterns. Placeholders
          # use 'x' repeated; real tokens don't.
          set +e
          found=0
          for pat in \
            'AKIA[A-HJ-NP-Z0-9]{16}' \
            'ghp_[A-Za-z0-9]{36}' \
            'gho_[A-Za-z0-9]{36}' \
            'HRKU-[a-f0-9]{32,}' \
            'xoxb-[0-9]{11,13}-[0-9]{11,13}-[A-Za-z0-9]{24}' \
            'sntrys_[A-Za-z0-9_]{60,}' \
            'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{80,}'; do
            matches=$(grep -rEn "$pat" --include='*.md' --include='*.json' --include='*.sh' --include='*.yml' . 2>/dev/null | grep -v 'xxx' | grep -v 'X{')
            if [ -n "$matches" ]; then
              echo "POTENTIAL LEAK matching $pat:"
              echo "$matches"
              found=1
            fi
          done
          [ "$found" -eq 0 ] && echo "No real credentials detected"
          exit $found

      - name: Verify .gitignore blocks key/cert/cred patterns
        run: |
          for f in test.key test.pem test.p12 id_rsa firebase-adminsdk-foo.json gcp-key.json .kube/config secrets.yml .env credentials.json random.token; do
            if ! git check-ignore "$f" >/dev/null 2>&1; then
              echo "FAIL: $f not blocked by .gitignore"
              exit 1
            fi
          done
          echo "All credential file patterns properly blocked"
